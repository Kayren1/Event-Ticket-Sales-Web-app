{% extends 'base.html' %}
{% block content %}
    <div class="container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
            <a href="{% url 'event_detail' event.id %}">Cancel</a>
        </form>
    </div>
{% endblock %}
